name: CI

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master, develop]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  pint:
    name: Pint (PHP lint)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP 8.3
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          coverage: none
          tools: composer:v2

      - name: Cache composer
        uses: actions/cache@v4
        with:
          path: ~/.composer/cache/files
          key: composer-${{ hashFiles('composer.lock') }}
          restore-keys: composer-

      - name: Install dependencies
        run: composer install --prefer-dist --no-interaction --no-progress

      - name: Run Pint (dry-run)
        run: vendor/bin/pint --test

  phpunit:
    name: PHPUnit (Postgres 17)
    runs-on: ubuntu-latest
    needs: pint

    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_USER: sepetak
          POSTGRES_PASSWORD: sepetak
          POSTGRES_DB: sepetak_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U sepetak -d sepetak_test"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10

    env:
      APP_ENV: testing
      APP_DEBUG: 'false'
      APP_KEY: base64:Yy9vSzR6eElJeFY4R01TS2k3U0NRaFRYcmFTRkJkWms=
      DB_CONNECTION: pgsql
      DB_HOST: 127.0.0.1
      DB_PORT: 5432
      DB_DATABASE: sepetak_test
      DB_USERNAME: sepetak
      DB_PASSWORD: sepetak
      MAIL_MAILER: array
      QUEUE_CONNECTION: sync
      SESSION_DRIVER: array
      CACHE_STORE: array
      FILESYSTEM_DISK: public

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP 8.3
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: mbstring, xml, pdo_pgsql, pgsql, bcmath, gd, intl, zip, fileinfo
          coverage: none
          tools: composer:v2

      - name: Cache composer
        uses: actions/cache@v4
        with:
          path: ~/.composer/cache/files
          key: composer-${{ hashFiles('composer.lock') }}
          restore-keys: composer-

      - name: Install dependencies
        run: composer install --prefer-dist --no-interaction --no-progress

      - name: Prepare .env
        run: |
          cp .env.example .env
          php artisan key:generate

      - name: Wait for Postgres
        run: |
          for i in {1..30}; do
            pg_isready -h 127.0.0.1 -p 5432 -U sepetak && break
            sleep 2
          done

      - name: Run migrations
        run: php artisan migrate --force

      - name: Run PHPUnit
        run: vendor/bin/phpunit

  build:
    name: Vite Build
    runs-on: ubuntu-latest
    needs: pint
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install npm dependencies
        run: npm ci

      - name: Build assets
        run: npm run build
