# =============================================================================
# Nginx — https://sepetak.org (Laravel + PHP-FPM)
# -----------------------------------------------------------------------------
# PENTING: file di /etc/nginx/sites-available/sepetak.org tidak boleh kosong.
# Jika kosong, permintaan TLS ke sepetak.org bisa jatuh ke server { } lain
# (SNI fallback) dan browser memunculkan sertifikat domain lain → error SSL.
#
# Instalasi (sesuaikan nama file dengan symlink yang dipakai di server):
#   sudo cp ops/nginx/sepetak.org.conf /etc/nginx/sites-available/sepetak.org
#   sudo ln -sf /etc/nginx/sites-available/sepetak.org /etc/nginx/sites-enabled/sepetak.org
#   sudo nginx -t && sudo systemctl reload nginx
#
# SSL:
#   sudo certbot --nginx -d sepetak.org -d www.sepetak.org
#
# Root Laravel: ganti baris `root` jika deploy di /var/www/sepetak.org/current/public
# Socket PHP:   ganti php8.4 → php8.3 jika perlu
# =============================================================================

server {
    listen 80;
    listen [::]:80;
    server_name sepetak.org www.sepetak.org;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
        allow all;
    }

    location / {
        return 301 https://sepetak.org$request_uri;
    }
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name www.sepetak.org;

    ssl_certificate     /etc/letsencrypt/live/sepetak.org/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/sepetak.org/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_prefer_server_ciphers off;

    return 301 https://sepetak.org$request_uri;
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name sepetak.org;

    # Produksi di host ini: /home/sepetak.org; pola rilis: /var/www/sepetak.org/current/public
    root /home/sepetak.org/public;
    index index.php;

    charset utf-8;
    client_max_body_size 50M;

    ssl_certificate     /etc/letsencrypt/live/sepetak.org/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/sepetak.org/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_prefer_server_ciphers off;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options SAMEORIGIN always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css application/json application/javascript application/xml text/xml image/svg+xml;

    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location /build/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    location = /robots.txt  { access_log off; log_not_found off; }
    location = /favicon.ico { access_log off; log_not_found off; }

    location ~ \.php$ {
        include snippets/fastcgi-php.conf;
        fastcgi_pass unix:/run/php/php8.4-fpm.sock;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_read_timeout 120s;
    }

    location ~ /\.(?!well-known).* {
        deny all;
    }

    location ~* ^/(?:\.env|storage/logs) {
        deny all;
    }

    access_log /var/log/nginx/sepetak.org-access.log;
    error_log  /var/log/nginx/sepetak.org-error.log warn;
}
