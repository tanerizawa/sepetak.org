# =============================================================================
# /etc/nginx/sites-available/sepetak.org.conf
# -----------------------------------------------------------------------------
# Server block produksi untuk https://sepetak.org
#
# Instalasi:
#   sudo cp ops/nginx/sepetak.org.conf /etc/nginx/sites-available/sepetak.org.conf
#   sudo ln -s /etc/nginx/sites-available/sepetak.org.conf /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx
#
# Pasang SSL (setelah DNS & http server block di bawah aktif):
#   sudo certbot --nginx -d sepetak.org -d www.sepetak.org --redirect
# =============================================================================

# HTTP → HTTPS redirect (apex + www)
server {
    listen 80;
    listen [::]:80;
    server_name sepetak.org www.sepetak.org;

    # Biarkan path /.well-known/acme-challenge/ untuk renewal certbot.
    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }

    location / {
        return 301 https://sepetak.org$request_uri;
    }
}

# HTTPS www → apex redirect
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name www.sepetak.org;

    ssl_certificate     /etc/letsencrypt/live/sepetak.org/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/sepetak.org/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;

    return 301 https://sepetak.org$request_uri;
}

# HTTPS apex
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name sepetak.org;

    root /var/www/sepetak.org/current/public;
    index index.php;

    charset utf-8;
    client_max_body_size 25M;

    # SSL cert (diatur certbot, placeholder untuk fresh install)
    ssl_certificate     /etc/letsencrypt/live/sepetak.org/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/sepetak.org/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;

    # Header keamanan dasar
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;

    # Gzip
    gzip on;
    gzip_vary on;
    gzip_comp_level 5;
    gzip_min_length 1024;
    gzip_types text/plain text/css application/json application/javascript
               application/xml text/xml image/svg+xml application/rss+xml
               application/atom+xml application/xhtml+xml;

    # Asset hasil build Vite — cache panjang (hash file sudah di-bust otomatis)
    location /build/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # Asset statis umum
    location ~* \.(?:ico|css|js|gif|jpe?g|png|webp|svg|woff2?)$ {
        expires 30d;
        add_header Cache-Control "public";
        access_log off;
        try_files $uri $uri/ /index.php?$query_string;
    }

    # Health endpoint sering dipanggil uptime monitor → matikan access log
    location = /health {
        access_log off;
        try_files $uri /index.php?$query_string;
    }

    # Throttling dasar untuk login/register (beri 30 r/m di panel admin)
    limit_req_zone $binary_remote_addr zone=sepetak_admin:10m rate=30r/m;
    location = /admin/login {
        limit_req zone=sepetak_admin burst=10 nodelay;
        try_files $uri /index.php?$query_string;
    }

    location = /robots.txt  { access_log off; log_not_found off; try_files $uri /index.php?$query_string; }
    location = /favicon.ico { access_log off; log_not_found off; }

    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location ~ \.php$ {
        include snippets/fastcgi-php.conf;
        # Sesuaikan versi PHP bila memakai 8.4
        fastcgi_pass unix:/run/php/php8.3-fpm.sock;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_read_timeout 60s;
    }

    # Blok akses ke dotfiles + env + logs
    location ~ /\.(?!well-known).* {
        deny all;
    }
    location ~* ^/(?:\.env|storage/logs) {
        deny all;
    }

    access_log /var/log/nginx/sepetak.org-access.log;
    error_log  /var/log/nginx/sepetak.org-error.log warn;
}
